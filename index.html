<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国近现代史记忆地图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: "Microsoft YaHei", sans-serif; }
        #map { width: 100vw; height: 100vh; }

        /* 暖色复古覆盖层（不影响交互和弹窗） */
        .map-warm-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: rgba(180, 130, 80, 0.08);
            z-index: 500;
        }

        /* 顶部历史总时间标题 */
        .history-header {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1000;
            background: rgba(118, 60, 60, 0.852);
            color: #fff9f6;
            width: 100%;
            text-align: center;
            padding: 10px 0;
            font-size: 20px;
            letter-spacing: 4px;
            backdrop-filter: blur(4px);
            border-bottom: 1px solid #212121;
        }

        /* ---------- 图例面板 ---------- */
        .legend-panel {
            position: absolute;
            top: 80px;
            right: 10px;
            z-index: 1001;
            background: rgba(0, 0, 0, 0.75);
            color: #f0e6c5;
            border-radius: 8px;
            max-width: 220px;
            backdrop-filter: blur(6px);
            border: 1px solid #b59b6b;
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .legend-panel.collapsed .legend-content {
            display: none;
        }
        .legend-toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            cursor: pointer;
            user-select: none;
            font-weight: bold;
            letter-spacing: 1px;
            border-bottom: 1px solid transparent;
        }
        .legend-panel:not(.collapsed) .legend-toggle {
            border-bottom: 1px solid #b59b6b;
        }
        .legend-toggle:hover {
            background: rgba(255,255,255,0.1);
        }
        .legend-content {
            padding: 10px 12px;
            font-size: 14px;
            line-height: 1.8;
        }
        .legend-content div {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .legend-content span {
            font-size: 18px;
            width: 24px;
            text-align: center;
        }

        /* 弹窗内部样式 */
        .history-popup {
            max-width: 320px;
            font-size: 14px;
            line-height: 1.6;
        }
        .history-popup h3 {
            margin: 0 0 6px;
            font-size: 18px;
            border-bottom: 1px solid #b59b6b;
            padding-bottom: 4px;
            color: #4abfe6;
        }
        .history-popup .meta {
            margin-bottom: 8px;
            color: #ee3622;
            font-size: 13px;
        }
        .history-popup .person-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            margin-right: 10px;
            float: left;
            border: 2px solid #6ce5bf;
        }
        .history-popup .event-title {
            font-weight: bold;
            margin: 10px 0 4px;
            clear: both;
            font-size: 15px;
        }
        .history-popup .detail {
            color: #3a3125;
            margin-top: 4px;
            text-align: justify;
        }
        .history-popup .scene-img {
            width: 100%;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        .custom-div-icon {
            font-size: 28px;
            text-align: center;
            line-height: 30px;
            background: none;
            border: none;
        }
    </style>
</head>
<body>
    <!-- 顶部总时间条 -->
    <div class="history-header">📜 中国近现代史 · 1840 — 1949 
        中国党史新民主主义时期 · 1918 — 1949</div>

    <!-- 图例面板 -->
    <div class="legend-panel collapsed" id="legendPanel">
        <div class="legend-toggle" id="legendToggle">
            <span>📖 图例</span>
            <span id="legendArrow">▶</span>
        </div>
        <div class="legend-content">
            <div><span>⭐</span> 1911-1919 旧民主主义革命</div>
            <div><span>🔥</span> 1919-1927 建党和大革命</div>
            <div><span>⛏️</span> 1927-1937 土地革命</div>
            <div><span>⚔️</span> 1937-1945 抗日战争</div>
            <div><span>🕊️</span> 1945-1949 解放战争</div>
        </div>
    </div>

    <div id="map"></div>
    <!-- 暖色覆盖层 -->
    <div class="map-warm-overlay"></div>

    <script>
        // ========== 🔑 高德Key ==========
        const amapKey = '01738e84c81339d5650d23e88742cf48';

        // ========== 📖 历史事件数据 ==========
        const historyEvents = [
            {
                name: '广州',
                lat: 23.1291,
                lng: 113.2644,
                time: '1911年4月27日',
                person: '黄兴',
                personImg: 'https://i.ibb.co/DfLJSQTh/image.png',
                event: '黄花岗起义',
                detail: '同盟会发动的第十次武装起义，七十二烈士葬于黄花岗。为辛亥革命的前奏，震动全国。',
                sceneImg: '',
                iconHtml: '⭐',
                panoramaUrl: 'https://www.720yun.com/vr/0c82aasO9ca?from=embed'
            },
            {
                name: '武汉',
                lat: 30.5928,
                lng: 114.3055,
                time: '1911年10月10日',
                person: '熊秉坤',
                personImg: 'https://i.postimg.cc/yYBR9gRf/image.png',
                event: '武昌起义',
                detail: '湖北新军打响辛亥革命第一枪，随后各省纷纷响应，清朝统治土崩瓦解。',
                sceneImg: '',
                iconHtml: '⭐',
                panoramaUrl: ''
            },
            {
                name: '南京',
                lat: 32.0603,
                lng: 118.7969,
                time: '1912年1月1日',
                person: '孙中山',
                personImg: 'https://i.postimg.cc/Cx9kRvs4/image.png',
                event: '中华民国成立',
                detail: '孙中山在南京宣誓就任临时大总统，亚洲第一个民主共和国诞生。',
                sceneImg: '',
                iconHtml: '⭐',
                panoramaUrl: ''
            },
            {
                name: '北京',
                lat: 39.9042,
                lng: 116.4074,
                time: '1919年5月4日',
                person: '李大钊',
                personImg: 'https://i.postimg.cc/rmNrYqXf/image.png',
                event: '五四运动',
                detail: '以学生为先导的爱国运动，新民主主义革命的开端，马克思主义广泛传播。',
                sceneImg: '',
                iconHtml: '🔥',
                panoramaUrl: ''
            },
            {
                name: '上海',
                lat: 31.2304,
                lng: 121.4737,
                time: '1921年7月23日',
                person: '毛泽东、李达、李汉俊等13人',
                personImg: 'https://i.postimg.cc/KYDMV2Fs/image.png',
                event: '中共一大',
                cause: '俄国十月革命胜利后，马克思主义在中国广泛传播，各地共产主义小组相继成立，建立全国统一的无产阶级政党的条件已经成熟。',
                detail: '中国共产党第一次全国代表大会在上海召开，中国革命的面貌焕然一新。',
                impact: '中国共产党的成立，是中华民族发展史上开天辟地的大事，深刻改变了近代以后中华民族发展的方向和进程，改变了中国人民和中华民族的前途和命运，改变了世界发展的趋势和格局。',
                sceneImg: 'https://i.postimg.cc/d1cyNVzw/image.png',
                iconHtml: '🚩',
                panoramaUrl: '',
                videoUrl: 'https://player.bilibili.com/player.html?bvid=xxxxx',  // 视频嵌入链接
                delegates: [
                    {
                        name: '李达',
                        hometown: '湖南零陵',
                        role: '上海代表，会议筹备者，负责与共产国际代表联络',
                        img: 'https://i.postimg.cc/mZcvy2TM/image.png'
                    },
                    {
                        name: '李汉俊',
                        hometown: '湖北潜江',
                        role: '上海代表，会议地点提供者（其兄李书城的寓所）',
                        img: 'https://i.postimg.cc/7LWB50JP/image.png'
                    },
                    // ... 其余11位代表按相同格式添加
                ]
            },
            {
                name: '南昌',
                lat: 28.6820,
                lng: 115.8579,
                time: '1927年8月1日',
                person: '周恩来',
                personImg: 'https://i.postimg.cc/2yqCLxw7/image.png',
                event: '南昌起义',
                detail: '打响武装反抗国民党反动派的第一枪，是创建人民军队的开始。',
                sceneImg: '',
                iconHtml: '🔥',
                panoramaUrl: ''
            },
            {
                name: '汉口',
                lat: 30.62,
                lng: 114.26,
                time: '1927年8月7日',
                person: '毛泽东',
                personImg: 'https://i.postimg.cc/TYwDC8kH/image.png',
                event: '八七会议',
                detail: '陈独秀右倾，毛泽东提出“政权是由枪杆子中取得的”，土地革命兴起。',
                sceneImg: '',
                iconHtml: '⛏️',
                panoramaUrl: ''
            },
            {
                name: '遵义',
                lat: 27.7214,
                lng: 106.9272,
                time: '1935年1月',
                person: '毛泽东',
                personImg: 'https://i.postimg.cc/TYwDC8kH/image.png',
                event: '遵义会议',
                detail: '确立了毛泽东在红军和中共中央的领导地位，挽救了党、红军和中国革命。',
                sceneImg: '',
                iconHtml: '⛏️',
                panoramaUrl: ''
            },
            {
                name: '延安',
                lat: 36.5855,
                lng: 109.4895,
                time: '1937年—1947年',
                person: '毛泽东',
                personImg: 'https://i.postimg.cc/TYwDC8kH/image.png',
                event: '延安时期',
                detail: '中共中央所在地，抗日战争和解放战争初期的指挥中枢，形成了延安精神。',
                sceneImg: '',
                iconHtml: '⚔️',
                panoramaUrl: ''
            }
        ];

        // ========== 🗺️ 地图初始化 ==========
        const map = L.map('map').setView([34.0, 108.0], 5);

        L.tileLayer(
            `https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}&key=${amapKey}`,
            {
                subdomains: ['1', '2', '3', '4'],
                attribution: '© 高德地图'
            }
        ).addTo(map);

       // ========== 📍 生成历史标记 ==========
        historyEvents.forEach(ev => {
            let popupHTML = `
                <div class="history-popup">
                    <h3>${ev.name}</h3>
                    <div class="meta">⏳ ${ev.time}</div>
            `;

            // 人物主图
            if (ev.personImg && ev.personImg.trim() !== '') {
                popupHTML += `<img class="person-img" src="${ev.personImg}" alt="${ev.person}">`;
            }

            popupHTML += `
                    <div style="overflow:hidden;">
                        <div><strong>👤 人物：</strong>${ev.person}</div>
                        <div class="event-title">📌 ${ev.event}</div>
            `;

            // 重点原因
            if (ev.cause && ev.cause.trim() !== '') {
                popupHTML += `<div style="margin-top:6px;"><strong>🔍 背景原因：</strong>${ev.cause}</div>`;
            }

            // 事件详情
            popupHTML += `<div class="detail">${ev.detail}</div>`;

            // 事件影响
            if (ev.impact && ev.impact.trim() !== '') {
                popupHTML += `<div style="margin-top:8px;color:#8b1a1a;"><strong>📜 历史影响：</strong>${ev.impact}</div>`;
            }

            popupHTML += `</div>`;

            // 13位代表详情（仅当有 delegates 数据时显示）
            if (ev.delegates && ev.delegates.length > 0) {
                popupHTML += `<div style="margin-top:10px;border-top:1px solid #b59b6b;padding-top:8px;"><strong>👥 13位代表：</strong></div>`;
                ev.delegates.forEach(d => {
                    popupHTML += `
                        <div style="display:flex;align-items:center;gap:8px;margin-top:6px;">
                            <img src="${d.img}" alt="${d.name}" style="width:40px;height:40px;object-fit:cover;border-radius:4px;">
                            <div style="font-size:12px;">
                                <strong>${d.name}</strong> · ${d.hometown}<br>
                                <span style="color:#5a4a3a;">${d.role}</span>
                            </div>
                        </div>
                    `;
                });
            }

            // 场景图（南湖游船等）
            if (ev.sceneImg && ev.sceneImg.trim() !== '') {
                popupHTML += `<img class="scene-img" src="${ev.sceneImg}" alt="场景图">`;
            }

            // 视频
            if (ev.videoUrl && ev.videoUrl.trim() !== '') {
                popupHTML += `<p>🎬 相关视频：</p><iframe src="${ev.videoUrl}" width="100%" height="200" frameborder="0" allowfullscreen></iframe>`;
            }

            // 全景图
            if (ev.panoramaUrl && ev.panoramaUrl.trim() !== '') {
                popupHTML += `<p>🎥 360° 全景：</p><iframe src="${ev.panoramaUrl}" width="100%" height="200" frameborder="0" allowfullscreen></iframe>`;
            }

            popupHTML += `</div>`;

            const iconHtml = ev.iconHtml || '📍';
            const customIcon = L.divIcon({
                html: iconHtml,
                className: 'custom-div-icon',
                iconSize: [30, 30],
                iconAnchor: [15, 30]
            });

            const marker = L.marker([ev.lat, ev.lng], { icon: customIcon }).addTo(map);
            marker.bindPopup(popupHTML, { maxWidth: 400 });  // 调大弹窗宽度以容纳更多内容
        });
       
    
    </script>
</body>
</html>
