<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国近现代史记忆地图</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { margin: 0; font-family: "Microsoft YaHei", sans-serif; }
        #map { width: 100vw; height: 100vh; }

        /* 顶部历史总时间标题 */
        .history-header {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            color: #f0e6c5;
            width: 100%;
            text-align: center;
            padding: 10px 0;
            font-size: 20px;
            letter-spacing: 4px;
            backdrop-filter: blur(4px);
            border-bottom: 1px solid #b59b6b;
        }

        /* 弹窗内部样式 */
        .history-popup {
            max-width: 320px;
            font-size: 14px;
            line-height: 1.6;
        }
        .history-popup h3 {
            margin: 0 0 6px;
            font-size: 18px;
            border-bottom: 1px solid #b59b6b;
            padding-bottom: 4px;
            color: #3d3222;
        }
        .history-popup .meta {
            margin-bottom: 8px;
            color: #5a4a3a;
            font-size: 13px;
        }
        .history-popup .person-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 8px;
            margin-right: 10px;
            float: left;
            border: 2px solid #b59b6b;
        }
        .history-popup .event-title {
            font-weight: bold;
            margin: 10px 0 4px;
            clear: both;
            font-size: 15px;
        }
        .history-popup .detail {
            color: #3a3125;
            margin-top: 4px;
            text-align: justify;
        }
        .history-popup .scene-img {
            width: 100%;
            margin-top: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <!-- 顶部总时间条：你可以自由修改文字 -->
    <div class="history-header">📜 中国近现代史 · 1840 — 1949 
        中国党史新民主主义时期 · 1918 — 1949</div>

    <div id="map"></div>

    <script>
        // ========== 🔑 1. 把你的高德Key粘贴到这里 ==========
        const amapKey = '01738e84c81339d5650d23e88742cf48';  // ← 换成你的 Key

        // ========== 📖 2. 修改下面的历史事件数据，想加几个城市就加几个 ==========
        const historyEvents = [
            {
                name: '广州',
                lat: 23.1291,
                lng: 113.2644,
                time: '1911年4月27日',
                person: '黄兴',
                personImg: 'https://example.com/huangxing.jpg',     // ← 换成黄兴图片链接
                event: '黄花岗起义',
                detail: '同盟会发动的第十次武装起义，七十二烈士葬于黄花岗。为辛亥革命的前奏，震动全国。',
                sceneImg: 'https://example.com/huanghuagang.jpg'    // ← 场景图链接（可选）
            },
            {
                name: '武汉',
                lat: 30.5928,
                lng: 114.3055,
                time: '1911年10月10日',
                person: '熊秉坤',
                personImg: 'https://example.com/xiongbingkun.jpg',
                event: '武昌起义',
                detail: '湖北新军打响辛亥革命第一枪，随后各省纷纷响应，清朝统治土崩瓦解。',
                sceneImg: ''
            },
            {
                name: '南京',
                lat: 32.0603,
                lng: 118.7969,
                time: '1912年1月1日',
                person: '孙中山',
                personImg: 'https://example.com/sunzhongshan.jpg',
                event: '中华民国成立',
                detail: '孙中山在南京宣誓就任临时大总统，亚洲第一个民主共和国诞生。',
                sceneImg: ''
            },
            {
                name: '北京',
                lat: 39.9042,
                lng: 116.4074,
                time: '1919年5月4日',
                person: '李大钊',
                personImg: 'https://example.com/lidazhao.jpg',
                event: '五四运动',
                detail: '以学生为先导的爱国运动，新民主主义革命的开端，马克思主义广泛传播。',
                sceneImg: ''
            },
            {
                name: '上海',
                lat: 31.2304,
                lng: 121.4737,
                time: '1921年7月23日',
                person: '毛泽东',
                personImg: 'https://example.com/maozedong.jpg',
                event: '中共一大',
                detail: '中国共产党第一次全国代表大会在上海召开，中国革命的面貌焕然一新。',
                sceneImg: ''
            },
            {
                name: '南昌',
                lat: 28.6820,
                lng: 115.8579,
                time: '1927年8月1日',
                person: '周恩来',
                personImg: 'https://example.com/zhouenlai.jpg',
                event: '南昌起义',
                detail: '打响武装反抗国民党反动派的第一枪，是创建人民军队的开始。',
                sceneImg: ''
            },
            {
                name: '遵义',
                lat: 27.7214,
                lng: 106.9272,
                time: '1935年1月',
                person: '毛泽东',
                personImg: 'https://example.com/maozedong2.jpg',
                event: '遵义会议',
                detail: '确立了毛泽东在红军和中共中央的领导地位，挽救了党、红军和中国革命。',
                sceneImg: ''
            },
            {
                name: '延安',
                lat: 36.5855,
                lng: 109.4895,
                time: '1937年—1947年',
                person: '毛泽东',
                personImg: 'https://example.com/maozedong3.jpg',
                event: '延安时期',
                detail: '中共中央所在地，抗日战争和解放战争初期的指挥中枢，形成了延安精神。',
                sceneImg: ''
            }
        ];

        // ========== 🗺️ 地图初始化（无需修改） ==========
        const map = L.map('map').setView([34.0, 108.0], 5);

        // 高德地图瓦片
        L.tileLayer(
            `https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}&key=${amapKey}`,
            {
                subdomains: ['1', '2', '3', '4'],
                attribution: '© 高德地图'
            }
        ).addTo(map);

        // ========== 📍 生成历史标记 ==========
        historyEvents.forEach(ev => {
            // 构建弹窗内容：人物图 + 文字
            let popupHTML = `
                <div class="history-popup">
                    <h3>${ev.name}</h3>
                    <div class="meta">⏳ ${ev.time}</div>
            `;

            // 如果有设置人物图片，就显示出来
            if (ev.personImg && ev.personImg.trim() !== '') {
                popupHTML += `<img class="person-img" src="${ev.personImg}" alt="${ev.person}">`;
            }

            popupHTML += `
                    <div style="overflow:hidden;">
                        <div><strong>👤 人物：</strong>${ev.person}</div>
                        <div class="event-title">📌 ${ev.event}</div>
                        <div class="detail">${ev.detail}</div>
                    </div>
            `;

            // 如果有场景图
            if (ev.sceneImg && ev.sceneImg.trim() !== '') {
                popupHTML += `<img class="scene-img" src="${ev.sceneImg}" alt="场景图">`;
            }

            popupHTML += `</div>`;

            // 添加标记
            const marker = L.marker([ev.lat, ev.lng]).addTo(map);
            marker.bindPopup(popupHTML, { maxWidth: 350 });
        });

        // 点击地图空白处自动关闭弹窗（Leaflet默认行为，无需额外代码）
    </script>
</body>
</html>
